    // getUser
    async function getUser(id) {
        if (!id) {
            console.error('ID пользователя не определен');
            return null;
        }
        try {
            const response = await fetch(`admin/users/${id}`);
            if (!response.ok) {
               console.log("статус", response.status);
            }
            return await response.json();
        } catch (error) {
            console.error('Ошибка при получении данных пользователя:', error);
            return null;
        }
    }




    // fillTableForUsers
        async function fillTableForUsers() {
            const allUsers = document.getElementById("tableUsers");

            fetch("admin/users")
                .then(response => response.json())
                .then(data => {
                    if (Array.isArray(data)) {
                        data.forEach(user => {
                            const roles = user.roles.map(role => role.nameRole.replace("ROLE_", "")).join(", ");

                            allUsers.innerHTML +=
                                `
                          <tr>
                          <td>${user.id}</td>
                          <td>${user.firstName}</td>
                          <td>${user.lastName}</td>
                          <td>${user.age}</td>
                          <td>${user.email}</td>
                          <td>${roles}</td>
                           <td>
                                <button type="button" class="btn btn-sm btn-info" data-toggle="modal"  data-action="edit" data-id="${user.id}" data-target="#edit">Edit</button>
                            </td>
                            <td>
                                <button type="button" class="btn btn-sm btn-danger" data-bs-toggle="modal"  data-bs-target="#deleteModal" data-user-id="${user.id}">Delete</button>
                             </td>
                        </td>
                          <tr>
                          `
                        })
                    } else {
                        console.log("Error: Data is not an array.");
                    }
                })
                .catch(error => {
                    console.log("Error: ", error);
                });
        }

        // fillTableForUser
        async function fillTableForUser() {
            const userAdminInfo = document.getElementById("newNavbar");
            let newNavbar = ""
            const userTable = document.getElementById("tableUser");
            let u = ""
            fetch("admin/users/user")
                .then(response => response.json())
                .then(user => {
                    const roles = user.roles.map(role => role.nameRole.replace("ROLE_", "")).join(", ");
                    newNavbar = `<h5><strong>${user.email} with roles: ${roles}</strong></h5>`
                    userAdminInfo.innerHTML = newNavbar
                    u =
                        `<tr>
                        <td>${user.id}</td>
                        <td>${user.firstName}</td>
                        <td>${user.lastName}</td>
                        <td>${user.age}</td>
                        <td>${user.email}</td>
                        <td>${roles}</td>
                        </tr>
                 `
                    userTable.innerHTML = u;
                })
                .catch(error => {
                    console.log("Error: ", error);
                });
        }

// new User
       async function addNewUser() {

            document.getElementById("newUserForm").addEventListener("submit", async function (event) {
                event.preventDefault();
                const newUser = {
                    firstName: document.getElementById("newUserName").value,
                    lastName: document.getElementById("newUserSurname").value,
                    age: document.getElementById("newUserAge").value,
                    email: document.getElementById("newUserEmail").value,
                    password: document.getElementById("newUserPassword").value,
                    roles: Array.from(document.getElementById("newUserRole").selectedOptions).map(option => option.value)
                };

                try {
                    const response = await fetch("admin/users", {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(newUser)
                    });

                    if (response.ok) {
                        console.log('User added successfully');

                        document.getElementById("newUserForm").reset(); // Очищаем форму после добавления пользователя
                        document.querySelector('a#nav-home-tab').click(); // Переходим на главную страницу после добавления пользователя
                        await fillTableForUsers();
                    }
                } catch (error) {
                    console.error('Error adding user:', error);
                }
            });
        }

                try {
                    const user = await getUser(id);// Получаем данные пользователя по IDя
                    console.log(user);
                    // Заполняем поля модального окна данными пользователя

                    document.getElementById('deleteFirstName').value = user.firstName;

                    document.getElementById('deleteAge').value = user.age;
                    document.getElementById('deleteEmail').value = user.email;
                    document.getElementById('deletePassword').value = user.password;

                    // Заполняем роли

                    });

                }
            }
