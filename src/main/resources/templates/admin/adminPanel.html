<script>
    document.addEventListener('DOMContentLoaded', async function () {
        await fillTableForUsers();
       await fillTableForUser();
        await addNewUser();

    });

    // fillTableForUsers
    async function fillTableForUsers() {
        const allUsers = document.getElementById("tableUsers");

        fetch("admin/users")
            .then(response => response.json())
            .then(data => {
                if (Array.isArray(data)) {
                    data.forEach(user => {
                        const roles = user.roles.map(role => role.nameRole.replace("ROLE_", "")).join(", ");

                        allUsers.innerHTML +=
                            `
                          <tr>
                          <td>${user.id}</td>
                          <td>${user.firstName}</td>
                          <td>${user.lastName}</td>
                          <td>${user.age}</td>
                          <td>${user.email}</td>
                          <td>${roles}</td>
                          <td>
                         <button type="button" data-bs-toggle="modal" class="btn btn-info" id ="buttonEdit" name="data-bs-target=${'#editModal' + user.id}">
                         Edit
                         </button>
                        </td>
                        <td>
                         <button type="button" data-bs-toggle="modal" class="btn btn-danger" id ="buttonDelete" name=data-bs-target="${'#deleteModal' + user.id}">
                         Delete
                         </button>
                        </td>
                          <tr>
                          `
                    })
                } else {
                    console.log("Error: Data is not an array.");
                }
            })
            .catch(error => {
                console.log("Error: ", error);
            });
    }

    // fillTableForUser
    async function fillTableForUser() {
        const userAdminInfo = document.getElementById("newNavbar");
        let newNavbar=""
        const userTable = document.getElementById("tableUser");
        let u = ""
        fetch("admin/users/user")
            .then(response => response.json())
            .then(user => {
                const roles = user.roles.map(role => role.nameRole.replace("ROLE_", "")).join(", ");
                newNavbar = `<h5><strong>${user.email} with roles: ${roles}</strong></h5>`
                userAdminInfo.innerHTML = newNavbar
                u =
                    `<tr>
                        <td>${user.id}</td>
                        <td>${user.firstName}</td>
                        <td>${user.lastName}</td>
                        <td>${user.age}</td>
                        <td>${user.email}</td>
                        <td>${roles}</td>
                        </tr>
                 `
                userTable.innerHTML = u;
            })
            .catch(error => {
                console.log("Error: ", error);
            });
    }

    // switchPanel admin/user

    const adminTab = document.getElementById('v-pills-admin-tab');
    const userTab = document.getElementById('v-pills-user-tab');
    const adminContent = document.getElementById('v-pills-admin');
    const userContent = document.getElementById('v-pills-user');

    // Функция для переключения панелей
   async function switchPanel(activeTab, inactiveTab, activeContent, inactiveContent) {
        // Скрываем неактивный контент и убираем активный класс с неактивной вкладки
        inactiveContent.classList.remove('show', 'active');
        inactiveTab.classList.remove('active');

        // Показываем активный контент и добавляем активный класс к активной вкладке
        activeContent.classList.add('show', 'active');
        activeTab.classList.add('active');
    }

    // Добавляем обработчики событий для вкладок
    adminTab.addEventListener('click', (event) => {
        event.preventDefault(); // Предотвращаем переход по ссылке
        switchPanel(adminTab, userTab, adminContent, userContent);
    });

    userTab.addEventListener('click', (event) => {
        event.preventDefault(); // Предотвращаем переход по ссылке
        switchPanel(userTab, adminTab, userContent, adminContent);
    });

// new User
    function addNewUser() {

            document.getElementById("newUserForm").addEventListener("submit", async function (event) {
                event.preventDefault();
                const newUser = {
                    firstName: document.getElementById("newUserName").value,
                    lastName: document.getElementById("newUserSurname").value,
                    age: document.getElementById("newUserAge").value,
                    email: document.getElementById("newUserEmail").value,
                    password: document.getElementById("newUserPassword").value,
                    roles: Array.from(document.getElementById("newUserRole").selectedOptions).map(option => option.value)


                };

                try {
                    const response = await fetch("admin/users", {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(newUser)
                    });

                    if (response.ok) {
                        console.log('User added successfully');

                        document.getElementById("newUserForm").reset(); // Очищаем форму после добавления пользователя
                        document.querySelector('a#nav-home-tab').click(); // Переходим на главную страницу после добавления пользователя
                        await fillTableForUsers(); // Обновляем таблицу после добавления пользователя

                    } else {
                        console.error('Error adding user');

                    }
                } catch (error) {
                    console.error('Error:', error);
                    resolve();
                }
            });
    }

</script>
